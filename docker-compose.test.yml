version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: videotube_postgres_test
    environment:
      POSTGRES_USER: videotube_test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: videotube_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videotube_test"]
      interval: 10s
      timeout: 5s
      retries: 5
